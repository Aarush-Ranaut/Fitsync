plugins {
    id "com.android.application"
    id "kotlin-android"
    id "com.google.gms.google-services"
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    compileSdkVersion 35
    namespace "com.example.fitsync_app"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }
    
    lintOptions {
        disable 'InvalidResource'  // Suppress lStar error temporarily
    }

    defaultConfig {
        applicationId "com.example.fitsync_app"
        minSdkVersion 26
        targetSdkVersion 35
        versionCode 1
        versionName "1.0"
        multiDexEnabled true
        resConfigs "en"
    }

    buildTypes {
        release {
            minifyEnabled false
            shrinkResources false
            signingConfig signingConfigs.debug
        }
    }

    aaptOptions {
        ignoreAssetsPattern "!.svn:!.git:!.ds_store:!*.scc:.*:<dir>_*:!CVS:!thumbs.db:!picasa.ini:!*~"
        noCompress "tflite"
    }
}

flutter {
    source "../.."
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib:2.1.0"  // Force 2.1.0
    implementation 'androidx.multidex:multidex:2.0.1'

    implementation 'com.facebook.fresco:fresco:3.0.0'
    implementation 'com.facebook.fresco:imagepipeline-native:3.0.0'
    implementation 'com.facebook.fresco:webpsupport:3.0.0'
    implementation 'com.facebook.fresco:animated-webp:3.0.0'

    implementation 'com.google.mlkit:text-recognition:16.0.0'
    implementation 'com.google.mlkit:text-recognition-chinese:16.0.0'
    implementation 'com.google.mlkit:text-recognition-devanagari:16.0.0'
    implementation 'com.google.mlkit:text-recognition-japanese:16.0.0'
    implementation 'com.google.mlkit:text-recognition-korean:16.0.0'
}